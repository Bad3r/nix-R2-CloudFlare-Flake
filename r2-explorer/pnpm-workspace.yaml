packages:
  - web
# Moved from package.json "pnpm.overrides": pnpm v11 only reads overrides from
# the workspace manifest, so the package.json copy was silently ignored and left
# a duplicate transitive wrangler@4.50.0 in the tree alongside the pinned 4.71.0.
overrides:
  svgo: ^4.0.1
  wrangler: ^4.108.0
  # Security floors for transitive advisories (pnpm audit --audit-level=high):
  # sharp <0.35.0 inherits libvips CVE-2026-33327/33328/35590/35591
  # (GHSA-f88m-g3jw-g9cj) via @cloudflare/vitest-pool-workers>miniflare>sharp;
  # fast-uri <=3.1.3 host confusion (GHSA-v2hh-gcrm-f6hx) via @astrojs/check.
  sharp: ">=0.35.0"
  fast-uri: ^3.1.4
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - "@astrojs/telemetry@3.3.3"
  - astro@7.1.3
  - package-manager-detector@1.8.0
  - postcss@8.5.21
