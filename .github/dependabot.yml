version: 2

updates:
  # ── npm (pnpm) dependencies for the Cloudflare Worker ──
  - package-ecosystem: "npm"
    directory: "/r2-explorer"
    schedule:
      interval: "weekly"
      day: "monday"
    versioning-strategy: "lockfile-only"
    labels:
      - "Dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
          - "miniflare"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions used in CI and deploy workflows ──
  # "/" covers .github/workflows; composite action directories are listed
  # explicitly so the actions pinned inside them keep receiving updates.
  # (A "/r2-explorer" entry was removed: r2-explorer/.github does not exist.)
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/setup-nix-cachix"
      - "/.github/actions/security-sensitive-change-policy"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "Dependencies"
      - "CI"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "actions/*"
        update-types:
          - "minor"
          - "patch"
