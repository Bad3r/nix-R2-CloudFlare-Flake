# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Claude Issue Triage

on:
  issues:
    types: [opened]

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # NOTE: requires a .claude/commands/label-issue.md file in the repo
      # The action's default actor gate applies: issues opened by accounts
      # without write access do not start the agent. Do not re-add
      # allowed_non_write_users: "*"; it would feed any account's issue body
      # into an agent holding issues: write.
      - name: Run Claude Code for Issue Triage
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          prompt: "/label-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }}"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
