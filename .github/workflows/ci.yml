# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: [main]
  # labeled/unlabeled are intentionally not triggers here: a label toggle must
  # not rerun (or cancel, via the concurrency group below) the expensive
  # validation jobs, and it must not emit fresh "skipped" check runs that
  # would supersede real validation results. Label changes are handled by
  # security-policy-refresh.yml, which re-runs only the
  # security-sensitive-change-policy check.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

# Default token scope for all jobs; jobs needing more declare it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Path-group change detection (issues #34/#35). Pull requests are filtered
  # with dorny/paths-filter against the PR base; push and workflow_dispatch
  # events force every group to "true" so all jobs still run unconditionally
  # there (issue #37).
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      any: ${{ github.event_name != 'pull_request' || steps.filter.outputs.any == 'true' }}
      root_nix: ${{ github.event_name != 'pull_request' || steps.filter.outputs.root_nix == 'true' }}
      worker: ${{ github.event_name != 'pull_request' || steps.filter.outputs.worker == 'true' }}
      web: ${{ github.event_name != 'pull_request' || steps.filter.outputs.web == 'true' }}
      docs: ${{ github.event_name != 'pull_request' || steps.filter.outputs.docs == 'true' }}
      templates: ${{ github.event_name != 'pull_request' || steps.filter.outputs.templates == 'true' }}
      workflows: ${{ github.event_name != 'pull_request' || steps.filter.outputs.workflows == 'true' }}
      scripts: ${{ github.event_name != 'pull_request' || steps.filter.outputs.scripts == 'true' }}
      lockfiles: ${{ github.event_name != 'pull_request' || steps.filter.outputs.lockfiles == 'true' }}
      ci_config: ${{ github.event_name != 'pull_request' || steps.filter.outputs.ci_config == 'true' }}
    steps:
      - name: Detect changed path groups (pull_request only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            any:
              - "**"
            root_nix:
              - "flake.nix"
              - "flake.lock"
              - "default.nix"
              - "lib/**"
              - "modules/**"
              - "packages/**"
            worker:
              - "r2-explorer/**"
            web:
              - "r2-explorer/web/**"
            docs:
              - "docs/**"
              - "README.md"
            templates:
              - "templates/**"
            workflows:
              - ".github/workflows/**"
              - ".github/actions/**"
            scripts:
              - "scripts/**"
            lockfiles:
              - "**/flake.lock"
              - "**/pnpm-lock.yaml"
            ci_config:
              - ".github/workflows/ci.yml"
              - ".github/actions/**"
              - "scripts/ci/**"

      - name: Report resolved change groups
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_OUTPUTS: ${{ toJSON(steps.filter.outputs) }}
        run: |
          set -euo pipefail
          log() { echo "[changes] $*"; }
          log "event=${EVENT_NAME}"
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            log "non-pull_request event: all change groups forced to true; no job is skipped (issue #37)."
          else
            log "pull_request path filter results: ${FILTER_OUTPUTS}"
          fi

  validate-root-format-lint:
    name: validate (root-format-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    # treefmt/lint covers every file type, so any change is relevant (#36).
    if: needs.changes.outputs.any == 'true'
    env:
      CI_STRICT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN != '') }}

      - name: Validate target
        run: ./scripts/ci/validate.sh --target root-format-lint

  validate-root-flake-template-docs:
    name: validate (root-flake-template-docs)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    # Covers flake checks, template init, docs cross-links, and the workflow
    # hardening scan, so it runs for Nix, docs, template, workflow, and CI
    # config changes (#36).
    if: >-
      needs.changes.outputs.root_nix == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.templates == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ci_config == 'true'
    env:
      CI_STRICT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN != '') }}

      - name: Validate target
        run: ./scripts/ci/validate.sh --target root-flake-template-docs

  validate-root-cli-module-eval:
    name: validate (root-cli-module-eval)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    # Builds the CLI and evaluates NixOS/HM modules; skipped for docs-only or
    # worker-only pull requests (#39, #40).
    if: >-
      needs.changes.outputs.root_nix == 'true' ||
      needs.changes.outputs.ci_config == 'true'
    env:
      CI_STRICT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN != '') }}

      - name: Validate target
        run: ./scripts/ci/validate.sh --target root-cli-module-eval

  validate-worker-typecheck-test:
    name: validate (worker-typecheck-test)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    # Worker typecheck/tests; skipped for docs-only pull requests (#39).
    if: >-
      needs.changes.outputs.worker == 'true' ||
      needs.changes.outputs.ci_config == 'true'
    env:
      CI_STRICT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN != '') }}

      - name: Validate target
        run: ./scripts/ci/validate.sh --target worker-typecheck-test

  security-dependency-audit:
    name: security-dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    # Audits flake inputs, worker dependencies, and the Nix closure; skipped
    # for docs-only pull requests (#39).
    if: >-
      needs.changes.outputs.root_nix == 'true' ||
      needs.changes.outputs.worker == 'true' ||
      needs.changes.outputs.lockfiles == 'true' ||
      needs.changes.outputs.ci_config == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN != '') }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: r2-explorer/pnpm-lock.yaml

      - name: Audit flake inputs (root + worker)
        run: |
          set -euo pipefail

          run_flake_checker() {
            local lock_path="$1"
            for attempt in 1 2 3; do
              if nix --accept-flake-config run nixpkgs#flake-checker -- \
                --no-telemetry \
                --fail-mode \
                --check-outdated \
                --check-owner \
                --check-supported \
                "$lock_path"; then
                return 0
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "flake-checker attempt ${attempt} failed for ${lock_path}; retrying..." >&2
                sleep 5
              fi
            done
            return 1
          }

          run_flake_checker flake.lock
          run_flake_checker r2-explorer/flake.lock

      - name: Install Worker dependencies
        working-directory: r2-explorer
        run: pnpm install --frozen-lockfile

      - name: Audit Worker dependencies (high+critical)
        working-directory: r2-explorer
        run: pnpm audit --audit-level=high

      - name: Build root package for closure scan
        run: nix --accept-flake-config build .#r2

      - name: Scan Nix closure with vulnix
        run: |
          set -euo pipefail
          out_path="$(nix --accept-flake-config path-info .#r2)"
          for attempt in 1 2 3; do
            if nix --accept-flake-config run nixpkgs#vulnix -- -C "$out_path" -w ./scripts/ci/vulnix-whitelist.toml; then
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "vulnix attempt ${attempt} failed; retrying..." >&2
              sleep 5
            fi
          done
          echo "vulnix scan failed after retries." >&2
          exit 1

  security-sensitive-change-policy:
    name: security-sensitive-change-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Runs unconditionally on every CI event (issue #38): the shared action
    # inspects the PR diff itself and early-exits when no sensitive paths
    # changed. Label add/remove re-evaluation is handled by
    # security-policy-refresh.yml, which shares the concurrency group below.
    concurrency:
      group: ci-security-sensitive-change-policy-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run sensitive-change policy
        uses: ./.github/actions/security-sensitive-change-policy

  # Single aggregation gate for branch protection (issue #41): make branch
  # protection require "ci-required" plus "security-sensitive-change-policy".
  # Jobs skipped by path filtering count as pass; failed or cancelled jobs
  # (including a failed "changes" job) fail the gate, so nothing is dropped
  # silently and no required check stays perpetually pending.
  # security-sensitive-change-policy is deliberately not aggregated here: it
  # stays its own required check so a label toggle can refresh it via
  # security-policy-refresh.yml without rerunning this workflow.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - changes
      - validate-root-format-lint
      - validate-root-flake-template-docs
      - validate-root-cli-module-eval
      - validate-worker-typecheck-test
      - security-dependency-audit
    steps:
      - name: Evaluate required job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          log() { echo "[ci-required] $*"; }

          failed=0
          while IFS=$'\t' read -r job result; do
            case "${result}" in
            success)
              log "job '${job}' succeeded"
              ;;
            skipped)
              log "job '${job}' was skipped by path filtering; treating as pass (issue #41)"
              ;;
            *)
              log "job '${job}' finished with result '${result}'"
              failed=1
              ;;
            esac
          done < <(jq -r 'to_entries[] | [.key, .value.result] | @tsv' <<<"${NEEDS_JSON}")

          if [[ ${failed} -ne 0 ]]; then
            log "at least one required job failed or was cancelled"
            exit 1
          fi
          log "all required jobs succeeded or were skipped"
